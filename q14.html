<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Question 14</title>
    <link rel="stylesheet" href="styles.css" />
    <script src="hunt-data.js" defer></script>
    <script src="script.js" defer></script>
  </head>
  <body>
    <main class="page-shell">
      <section class="hunt-card" data-question-number="14">
        <div class="card-top">
          <span class="eyebrow" data-step-label>Question 14</span>
          <h1 data-question-text>Loading question...</h1>
          <p class="question-copy" data-question-help>Loading answer rules...</p>
        </div>

        <div class="card-body">
          <div class="question-block">
            <label class="label" for="answer-q14">Enter your answer</label>
            <form class="answer-form" data-answer-form>
              <input
                class="answer-input"
                id="answer-q14"
                name="answer"
                type="text"
                autocomplete="off"
                placeholder="Type your answer here"
                data-answer-input
              />
              <button class="submit-button" type="submit">Unlock clue</button>
            </form>
            <p class="feedback" data-feedback aria-live="polite"></p>
          </div>

          <section class="clue-panel" data-clue>
            <p class="clue-title" data-clue-title>Clue unlocked</p>
            <p class="clue-text" data-clue-text></p>
          </section>
        </div>
      </section>
    </main>
  </body>
</html>
